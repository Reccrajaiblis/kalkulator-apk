name: 🚀 Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
        
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 🔧 Install Cordova
      run: npm install -g cordova
        
    - name: 📱 Create Cordova Project
      run: |
        cordova create kalkulator com.example.kalkulator Kalkulator
        cd kalkulator
        cordova platform add android
        cp ../index.html www/index.html
        
    - name: 🏗️ Build APK
      run: |
        cd kalkulator
        cordova build android --release
        
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Kalkulator-APK
        path: |
          kalkulator/platforms/android/app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: 🌐 Generate Web Preview
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./kalkulator/www
